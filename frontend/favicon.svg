  <rect x="18" y="5"  width="9" height="9" fill="#ffffff"/>
  <rect x="5"  y="18" width="9" height="9" fill="#ffffff"/>
  <rect x="18" y="18" width="9" height="9" fill="#ffffff" opacity="0.4"/>
</svg>
