<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Black rounded background -->
  <rect width="32" height="32" rx="7" fill="#111111"/>
  <!-- 2x2 grid mark (mirrors the logo mark in HTML) -->
