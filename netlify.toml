[build]
  publish = "frontend"

# Proxy /api/* → Railway backend
# After deploying backend on Railway, replace YOUR-RAILWAY-URL below
# Example: https://cotre-backend.up.railway.app
[[redirects]]
  from   = "/api/*"
  to     = "https://YOUR-RAILWAY-URL.up.railway.app/:splat"
  status = 200
  force  = true

# SPA fallback — serve index.html for any unmatched route
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
